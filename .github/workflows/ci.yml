name: CI

on:
    push:
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - parallel:
                  - name: fmt
                    run: deno fmt --check
                  - name: lint
                    run: deno lint
                  - name: test
                    run: deno task test
                  - name: check
                    run: deno task check
